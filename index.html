<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรับสมัคร</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📋 ระบบรับสมัคร</h1>
        
        <form id="registrationForm">
            <!-- ชื่อ-นามสกุล -->
            <div class="form-group">
                <label for="fullname">ชื่อ-นามสกุล <span class="required">*</span></label>
                <input type="text" id="fullname" name="fullname" required 
                       placeholder="กรอกชื่อ-นามสกุล">
            </div>

            <!-- อีเมล -->
            <div class="form-group">
                <label for="email">อีเมล <span class="required">*</span></label>
                <input type="email" id="email" name="email" required 
                       placeholder="example@email.com">
            </div>

            <!-- เบอร์โทร -->
            <div class="form-group">
                <label for="phone">เบอร์โทรศัพท์ <span class="required">*</span></label>
                <input type="tel" id="phone" name="phone" required 
                       placeholder="0812345678"
                       pattern="[0-9]{10}" title="กรุณากรอกเบอร์โทร 10 หลัก">
            </div>

            <!-- สังกัด/หน่วยงาน -->
            <div class="form-group">
                <label for="organization">สังกัด/หน่วยงาน</label>
                <input type="text" id="organization" name="organization" 
                       placeholder="คณะ/หน่วยงาน">
            </div>

            <!-- ตำแหน่ง -->
            <div class="form-group">
                <label for="position">ตำแหน่ง</label>
                <select id="position" name="position">
                    <option value="">-- เลือกตำแหน่ง --</option>
                    <option value="นิสิต">นิสิต</option>
                    <option value="อาจารย์">อาจารย์</option>
                    <option value="เจ้าหน้าที่">เจ้าหน้าที่</option>
                    <option value="บุคคลภายนอก">บุคคลภายนอก</option>
                </select>
            </div>

            <!-- หมายเหตุ -->
            <div class="form-group">
                <label for="note">หมายเหตุ</label>
                <textarea id="note" name="note" rows="3" 
                          placeholder="ข้อมูลเพิ่มเติม (ถ้ามี)"></textarea>
            </div>

            <!-- ปุ่มส่ง -->
            <button type="submit" id="submitBtn">
                ✅ ส่งใบสมัคร
            </button>
        </form>

        <!-- แสดงผลลัพธ์ -->
        <div id="result" class="result" style="display:none;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
